<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>shmol.cc</title>

<style>
html, body {
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:white;
cursor:none;
}

#dead-pixels {
position:fixed;
inset:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
}

#display-info {
position:fixed;
left:16px;
bottom:16px;
max-width:min(92vw,520px);
padding:8px 10px;
background:#000;
border:1px solid rgba(255,255,255,.5);
border-radius:10px;
color:#e8e8e8;
font:300 12px/1.35 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
letter-spacing:.02em;
white-space:pre-wrap;
display:none;
pointer-events:none;
z-index:20;
}

#taxi {
position:fixed;
inset:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
z-index:25;
}

#hypno {
position:fixed;
inset:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
z-index:24;
}
</style>
</head>

<body>
<canvas id="dead-pixels"></canvas>
<canvas id="hypno"></canvas>
<canvas id="taxi"></canvas>
<div id="display-info"></div>

<script>
const patterns = [
"white",
"black",
"red",
"green",
"blue",
"repeating-linear-gradient(0deg, black 0px, black 10px, white 10px, white 20px)",
"repeating-linear-gradient(90deg, black 0px, black 10px, white 10px, white 20px)",
"repeating-conic-gradient(black 0 25%, white 0 50%) 0 0 / 12px 12px"
];

let state = 0;
let lastTap = 0;
let deadPixelsOn = false;
let deadPixels = null;
let infoOn = false;
let refreshHz = null;
const deadPixelsCanvas = document.getElementById("dead-pixels");
const deadPixelsCtx = deadPixelsCanvas.getContext("2d");
const infoEl = document.getElementById("display-info");
const hypnoCanvas = document.getElementById("hypno");
const hypnoCtx = hypnoCanvas.getContext("2d");
const taxiCanvas = document.getElementById("taxi");
const taxiCtx = taxiCanvas.getContext("2d");

let hypnoOn = false;
let hypnoRaf = 0;
let hypnoAngle = 0;
let hypnoMode = "classic";
let hypnoRainbowHue = 0;
let hypnoRainbowGradTwist = 0;
let hypnoRainbowLinePhase = 0;
let hypnoGTimer = null;
const HYPNO_G_DOUBLE_MS = 240;

function drawHypnoSpiral(ctx, w, h, angle) {
const cx = w / 2;
const cy = h / 2;
const maxR = Math.hypot(cx, cy) * 1.22;
const growth = 2.85;
const stripe = 0.26;
const lw = 12;
const step = 0.055;
const rainbow = hypnoMode === "rainbow";
ctx.save();
ctx.translate(cx, cy);
ctx.rotate(angle);
if (rainbow) {
let bg;
if (ctx.createConicGradient) {
bg = ctx.createConicGradient(hypnoRainbowGradTwist + angle * 0.14, 0, 0);
for (let i = 0; i <= 14; i++) {
bg.addColorStop(i / 14, `hsl(${(i * 26 + hypnoRainbowHue) % 360}, 90%, 55%)`);
}
} else {
const k = hypnoRainbowGradTwist + angle * 0.08;
bg = ctx.createLinearGradient(
Math.cos(k) * -maxR,
Math.sin(k) * -maxR,
Math.cos(k + 1.7) * maxR,
Math.sin(k + 1.7) * maxR
);
for (let i = 0; i <= 10; i++) {
bg.addColorStop(i / 10, `hsl(${(i * 33 + hypnoRainbowHue) % 360}, 88%, 54%)`);
}
}
ctx.fillStyle = bg;
ctx.fillRect(-maxR, -maxR, maxR * 2, maxR * 2);
} else {
ctx.fillStyle = "#fff";
ctx.fillRect(-maxR, -maxR, maxR * 2, maxR * 2);
}
ctx.lineCap = "round";
ctx.lineJoin = "round";
ctx.lineWidth = lw;
let px;
let py;
for (let t = 0.35; t * growth < maxR + lw; t += step) {
const r = t * growth;
const x = r * Math.cos(t);
const y = r * Math.sin(t);
if (px !== undefined) {
const seg = Math.floor(t / stripe);
if (!rainbow && seg % 2 !== 0) {
px = x;
py = y;
continue;
}
let hue;
if (rainbow) {
hue = (seg * 47 + hypnoRainbowLinePhase + angle * 38) % 360;
ctx.strokeStyle = `hsl(${hue}, 94%, 57%)`;
} else {
ctx.strokeStyle = "#000";
}
ctx.beginPath();
ctx.moveTo(px, py);
ctx.lineTo(x, y);
ctx.stroke();
}
px = x;
py = y;
}
ctx.restore();
}

function stopHypnoAnim() {
if (hypnoRaf) cancelAnimationFrame(hypnoRaf);
hypnoRaf = 0;
hypnoCanvas.style.display = "none";
}

function hypnoFrame() {
if (!hypnoOn) return;
const w = window.innerWidth;
const h = window.innerHeight;
const dpr = window.devicePixelRatio || 1;
hypnoCanvas.width = Math.max(1, Math.floor(w * dpr));
hypnoCanvas.height = Math.max(1, Math.floor(h * dpr));
hypnoCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
drawHypnoSpiral(hypnoCtx, w, h, hypnoAngle);
hypnoAngle += 0.035;
hypnoRaf = requestAnimationFrame(hypnoFrame);
}

function clearHypnoGTimer() {
if (hypnoGTimer) {
clearTimeout(hypnoGTimer);
hypnoGTimer = null;
}
}

function startHypnoClassic() {
clearHypnoGTimer();
hypnoMode = "classic";
hypnoOn = true;
hypnoCanvas.style.display = "block";
hypnoRaf = requestAnimationFrame(hypnoFrame);
}

function startHypnoRainbow() {
clearHypnoGTimer();
hypnoRainbowHue = Math.random() * 360;
hypnoRainbowGradTwist = Math.random() * Math.PI * 2;
hypnoRainbowLinePhase = Math.random() * 360;
hypnoMode = "rainbow";
hypnoOn = true;
hypnoCanvas.style.display = "block";
hypnoRaf = requestAnimationFrame(hypnoFrame);
}

function stopHypnoFull() {
clearHypnoGTimer();
hypnoOn = false;
hypnoMode = "classic";
stopHypnoAnim();
}

function onHypnoGKey() {
if (hypnoOn) {
stopHypnoFull();
return;
}
if (hypnoGTimer) {
clearHypnoGTimer();
startHypnoRainbow();
return;
}
hypnoGTimer = setTimeout(() => {
hypnoGTimer = null;
startHypnoClassic();
}, HYPNO_G_DOUBLE_MS);
}

const TAXI_COLORS = ["#f7d000", "#000000", "#ffffff"];
const TAXI_DURATION_MS = 3200;
const TAXI_CELL = 36;
let taxiRaf = 0;
let taxiEndAt = 0;
let taxiMode = "checker";

function stopTaxi() {
if (taxiRaf) cancelAnimationFrame(taxiRaf);
taxiRaf = 0;
taxiCanvas.style.display = "none";
}

function drawTaxiChecker(ts) {
const w = window.innerWidth;
const h = window.innerHeight;
const dpr = window.devicePixelRatio || 1;
taxiCanvas.width = Math.max(1, Math.floor(w * dpr));
taxiCanvas.height = Math.max(1, Math.floor(h * dpr));
taxiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
const step = Math.floor((ts / 90) % 3);
for (let y = 0; y < h + TAXI_CELL; y += TAXI_CELL) {
for (let x = 0; x < w + TAXI_CELL; x += TAXI_CELL) {
const cx = Math.floor(x / TAXI_CELL);
const cy = Math.floor(y / TAXI_CELL);
const idx = (cx + cy + step) % 3;
taxiCtx.fillStyle = TAXI_COLORS[idx];
taxiCtx.fillRect(x, y, TAXI_CELL, TAXI_CELL);
}
}
}

function drawTaxiSplit(ts) {
const w = window.innerWidth;
const h = window.innerHeight;
const dpr = window.devicePixelRatio || 1;
taxiCanvas.width = Math.max(1, Math.floor(w * dpr));
taxiCanvas.height = Math.max(1, Math.floor(h * dpr));
taxiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
const step = Math.floor(ts / 140) % 3;
const left = TAXI_COLORS[step % 3];
const right = TAXI_COLORS[(step + 1) % 3];
taxiCtx.fillStyle = left;
taxiCtx.fillRect(0, 0, w / 2, h);
taxiCtx.fillStyle = right;
taxiCtx.fillRect(w / 2, 0, w / 2, h);
}

function taxiFrame() {
const now = performance.now();
if (now >= taxiEndAt) {
stopTaxi();
return;
}
if (taxiMode === "split") drawTaxiSplit(now);
else drawTaxiChecker(now);
taxiRaf = requestAnimationFrame(taxiFrame);
}

function startTaxi(mode) {
stopTaxi();
taxiMode = mode === "split" ? "split" : "checker";
taxiEndAt = performance.now() + TAXI_DURATION_MS;
taxiCanvas.style.display = "block";
taxiRaf = requestAnimationFrame(taxiFrame);
}

let touchY0 = 0;
let touchSwipeCount = 0;
let touchSwipeWindow = 0;
const SWIPE_MIN = 72;
const SWIPE_TRIPLE_MS = 900;

function onTouchStartTaxi(e) {
if (!e.touches || !e.touches.length) return;
touchY0 = e.touches[0].clientY;
}

function onTouchEndTaxi(e) {
if (!e.changedTouches || !e.changedTouches.length) return;
const y1 = e.changedTouches[0].clientY;
const dy = touchY0 - y1;
const now = Date.now();
if (dy > SWIPE_MIN) {
if (now - touchSwipeWindow > SWIPE_TRIPLE_MS) touchSwipeCount = 0;
touchSwipeCount++;
touchSwipeWindow = now;
if (touchSwipeCount >= 3) {
touchSwipeCount = 0;
startTaxi("split");
}
}
}

function buildDeadPixels(count) {
const w = window.innerWidth;
const h = window.innerHeight;
const arr = [];
for (let i = 0; i < count; i++) {
arr.push({
x: Math.floor(Math.random() * w),
y: Math.floor(Math.random() * h),
color: Math.random() > 0.5 ? "#000" : "#fff"
});
}
return arr;
}

function drawDeadPixels() {
const w = window.innerWidth;
const h = window.innerHeight;
deadPixelsCanvas.width = w;
deadPixelsCanvas.height = h;
deadPixelsCtx.clearRect(0, 0, w, h);
if (!deadPixels) deadPixels = buildDeadPixels(2);
for (const p of deadPixels) {
deadPixelsCtx.fillStyle = p.color;
deadPixelsCtx.fillRect(p.x, p.y, 1, 1);
}
}

function toggleDeadPixels() {
deadPixelsOn = !deadPixelsOn;
if (deadPixelsOn) {
drawDeadPixels();
deadPixelsCanvas.style.display = "block";
} else {
deadPixelsCanvas.style.display = "none";
}
}

function colorGamut() {
if (matchMedia("(color-gamut: rec2020)").matches) return "rec2020";
if (matchMedia("(color-gamut: p3)").matches) return "display-p3";
if (matchMedia("(color-gamut: srgb)").matches) return "sRGB";
return "unknown";
}

function dynamicRange() {
if (matchMedia("(dynamic-range: high)").matches) return "HDR";
if (matchMedia("(dynamic-range: standard)").matches) return "SDR";
return "unknown";
}

function updateDisplayInfo() {
if (!infoOn) return;
const lines = [
`Info`,
`Resolution: ${screen.width}x${screen.height}`,
`Refresh rate: ${refreshHz ? `${refreshHz} Hz (est.)` : "measuring..."}`,
`Color depth: ${screen.colorDepth || "n/a"}-bit`,
`Color space: ${colorGamut()}`,
`Dynamic range: ${dynamicRange()}`,
`DPR: ${window.devicePixelRatio || 1}`,
`Fullscreen: ${isFullscreen() ? "on" : "off"}`
];
infoEl.textContent = lines.join("\n");
}

function toggleDisplayInfo() {
infoOn = !infoOn;
infoEl.style.display = infoOn ? "block" : "none";
updateDisplayInfo();
}

function measureRefreshRate() {
const samples = [];
let prev = 0;
let n = 0;
function step(ts) {
if (prev) samples.push(ts - prev);
prev = ts;
n++;
if (n < 45) {
requestAnimationFrame(step);
return;
}
const avg = samples.reduce((a, b) => a + b, 0) / samples.length;
refreshHz = Math.round(1000 / avg);
updateDisplayInfo();
}
requestAnimationFrame(step);
}

function nextPattern() {
state = (state + 1) % patterns.length;
document.body.style.background = patterns[state];
}

function onTap(e) {
if (e.cancelable) e.preventDefault();
const now = Date.now();
if (now - lastTap < 250) return;
lastTap = now;
nextPattern();
}

function isFullscreen() {
return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function enterFullscreen() {
const el = document.documentElement;
if (el.requestFullscreen) return el.requestFullscreen();
if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
}

function exitFullscreen() {
if (document.exitFullscreen) return document.exitFullscreen();
if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
}

function onKeyDown(e) {
if (document.visibilityState !== "visible") return;
if (e.code === "Space") {
if (e.cancelable) e.preventDefault();
if (isFullscreen()) {
exitFullscreen();
} else {
enterFullscreen();
}
return;
}
if (e.key && e.key.toLowerCase() === "d") {
if (e.cancelable) e.preventDefault();
toggleDeadPixels();
return;
}
if (e.key && e.key.toLowerCase() === "i") {
if (e.cancelable) e.preventDefault();
toggleDisplayInfo();
return;
}
if (e.key && e.key.toLowerCase() === "t") {
if (e.cancelable) e.preventDefault();
startTaxi("checker");
return;
}
if (e.key && e.key.toLowerCase() === "g") {
if (e.cancelable) e.preventDefault();
if (e.repeat) return;
onHypnoGKey();
return;
}
}

document.body.style.background = patterns[state];
document.addEventListener("pointerdown", onTap, { passive: false });
document.addEventListener("touchstart", onTap, { passive: false });
document.addEventListener("click", onTap, { passive: false });
document.addEventListener("keydown", onKeyDown, { passive: false });
document.addEventListener("fullscreenchange", updateDisplayInfo);
document.addEventListener("webkitfullscreenchange", updateDisplayInfo);
window.addEventListener("resize", () => {
if (deadPixelsOn) drawDeadPixels();
updateDisplayInfo();
});
document.addEventListener("touchstart", onTouchStartTaxi, { passive: true });
document.addEventListener("touchend", onTouchEndTaxi, { passive: true });
measureRefreshRate();
</script>

</body>
</html>
