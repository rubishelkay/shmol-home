<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitor Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      cursor: none;
    }
  </style>
</head>
<body>
  <script>
    const patterns = [
      "#fff",
      "#000",
      "#f00",
      "#0f0",
      "#00f",
      "repeating-linear-gradient(0deg,#000 0 8px,#fff 8px 16px)",
      "repeating-linear-gradient(90deg,#000 0 8px,#fff 8px 16px)",
      "repeating-conic-gradient(#000 0 25%,#fff 0 50%) 0 0/16px 16px"
    ];
    let i = 0;
    const apply = () => (document.body.style.background = patterns[i]);
    addEventListener("click", () => {
      i = (i + 1) % patterns.length;
      apply();
    }, { passive: true });
    apply();
  </script>
</body>
</html>
